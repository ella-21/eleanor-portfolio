<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About, Eleanor Lansner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="../data.js"></script>
<script type="text/babel" src="../shared.jsx"></script>
<script type="text/babel">

const { useEffect } = React;
const D = window.SITE_DATA;

function App() {
  useReveal();
  return (
    <>
      <Nav current="about" />
      <main className="page">
        <header className="page-head">
          <div className="crumb"><a href="/">Home</a> <span>/</span> <span>About</span></div>
          <h1>Marketer.<br /><em>Runner.</em><br />Builder of things<br />worth showing up for.</h1>
          <p className="sub">A long-form bio, in three movements: how I got here, what I do, and what I'm chasing next.</p>
        </header>

        <section className="edit-split">
          <h2 className="es-head">GTM Professional with a <br /><em>Data-Focused Lens</em><br /></h2>
          <div className="es-body" data-reveal>
            <h4>I am a Product Marketer and Analyst driven by a simple question: How can we use data to build better products tell better stories?</h4>
            <h4>My foundation is in SaaS and product strategy, where I spent over four years learning how to build trust with global audiences and scale digital brands. While I loved the creative side of marketing, I realized that the most impactful product decisions are made when intuition is backed by evidence. I saw a massive opportunity to move beyond my 'gut feeling' and started leveraging product, customer, and third-party data to drive measurable growth. </h4>
            <h4>I recently completed my MSc in Business Analytics at the University of Colorado Boulder. This program allowed me to deepen my technical expertise in how data is collected, manipulated, and analyzed. Through coursework in Machine Learning, AI, and Big Data, as well as specialized projects in Supply Chain Analytics. I’ve developed a toolkit that bridges the gap between raw numbers and strategic product insights.</h4>
            <h4>I believe that data is the bridge between a good idea and a great product. By combining my background in product strategy with the technical rigor of business analytics, I aim to build experiences that are as intuitive as they are evidence-based.</p>
          </div>
          <div className="es-photo" data-reveal>
            <img src="../assets/portrait.png" alt="Eleanor" />
          </div>
        </section>

        <section className="pull-quote" data-reveal>
          <blockquote>
            “Brand instinct without data is a <em>guess.</em> Data without brand instinct is a <em>dashboard.</em>”
          </blockquote>
          <div className="attr">A working philosophy</div>
        </section>

        <section className="edit-split head-photo" style={{ borderTop: "1px solid var(--rule)", paddingTop: 80 }}>
          <h2 className="es-head"><em>Runner</em> first.</h2>
          <div className="es-photo" data-reveal style={{ background: "#000" }}>
            <img src="../assets/4tg.jpg" alt="4 The Girls Jog Club" style={{position:"absolute", inset:0, width:"100%", height:"100%", objectFit:"cover"}} />
            <div style={{ position: "absolute", inset: 0, background: "linear-gradient(180deg, rgba(0,0,0,.1) 0%, rgba(0,0,0,.55) 100%)" }}></div>
            <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "flex-end", justifyContent: "flex-start", fontFamily: "var(--display)", fontStyle: "italic", fontSize: "clamp(40px, 6vw, 84px)", color: "#fff", textAlign: "left", lineHeight: 0.95, padding: "32px 40px", textShadow: "0 2px 16px rgba(0,0,0,.4)" }}>
              4 The Girls Jog Club
            </div>
          </div>
          <div className="es-body" data-reveal>
            <h2>I’m a hybrid athlete at heart. After competing in Muay Thai competitions in college, I’ve hung up my gloves for super shoes. I am currently training for the Chicago Marathon (my second World Major, having just completed NYC in 2025). Marathon training provides the mental discipline and dedication I bring to my professional life, proving that whether it’s a product launch or a 26.2-mile course, success is built on data and persistence.</h2>
            <h4>I'm brining a Boulder based women only run club called, <strong style={{ fontFamily: "\"Instrument Serif\"" }}>4 The Girls Jog Club (4TGs)</strong> to NYC. 4TG is a running community built by women for women. It aims to make running more inclusive, while facilitating genuine connections. From first time runners to seasoned marathon runners, I hope to bring the same sense of joy and community that I found in running in Boulder to New York.</h4>
          </div>
        </section>

        <section className="section">
          <div className="section-head">
            <span className="num">A / Education</span>
            <h2>Where I <em>learned</em> the rest.</h2>
          </div>
          <div className="edu" data-reveal>
            {D.education.map((e, i) =>
            <div className="edu-card" key={i}>
                <div className="when">{e.when}</div>
                <h4>{e.degree}</h4>
                <div className="school">{e.school}</div>
                <div className="focus">{e.focus}</div>
              </div>
            )}
          </div>
        </section>

        <section className="section">
          <div className="section-head">
            <span className="num">B / Skills</span>
            <h2>What I <em>actually</em> do.</h2>
          </div>
          <div data-reveal>
            {Object.entries(D.skills).map(([cluster, items]) =>
            <div className="cluster" key={cluster}>
                <div className="cluster-label">{cluster}</div>
                <div className="skills-row">
                  {items.map((s, i) => <span className="skill" key={i}>{s}</span>)}
                </div>
              </div>
            )}
          </div>
        </section>

        <section className="section" style={{ borderBottom: 0 }}>
          <div className="cta-block">
            <h3>Want the <em>short version?</em></h3>
            <div style={{ display: "flex", gap: 16, justifyContent: "center", flexWrap: "wrap" }}>
              <a href="/resume" className="btn">View resume →</a>
              <a href="/career" className="btn outline">Career detail</a>
              <a href="/projects" className="btn outline">Projects</a>
            </div>
          </div>
        </section>
      </main>
      <Footer />
    </>);

}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
