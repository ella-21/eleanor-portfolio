<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resume | Eleanor Portfolio</title>
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.6;
        margin: 0;
        padding: 0;
        background: #f7fafc;
        color: #111827;
      }
      .page {
        max-width: 860px;
        margin: 0 auto;
        padding: 36px 24px;
      }
      .card {
        background: white;
        border-radius: 20px;
        padding: 24px;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      }
      .crumb {
        margin-bottom: 18px;
        color: #4b5563;
      }
      h1, h2 {
        margin-top: 0;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="crumb"><a href="/">Home</a> / Resume</div>
      <div class="card">
        <header>
          <h1>Resume</h1>
          <p>Placeholder resume content. Replace these sections with your actual experience and education.</p>
        </header>
        <section>
          <h2>Experience</h2>
          <p>List your most recent roles, responsibilities, and achievements here.</p>
        </section>
        <section style="margin-top: 20px;">
          <h2>Education</h2>
          <p>Add your credentials, courses, and certifications in this section.</p>
        </section>
      </div>
    </main>
  </body>
</html>
