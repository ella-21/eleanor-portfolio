<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Career, Eleanor Lansner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="../data.js"></script>
<script type="text/babel" src="../shared.jsx"></script>
<script type="text/babel">
const { useState, useEffect } = React;
const D = window.SITE_DATA;

function Row({ row, idx }) {
  return (
    <div className="career-row expanded" data-reveal>
      <div className="when">{row.when}</div>
      <div className="who">
        <h3>{row.role}</h3>
        <div className="co">{row.company}</div>
        <div className="summary">{fmtInline(row.summary)}</div>
      </div>
      <div className="toggle" style={{visibility: "hidden"}}>+</div>
      <div className="detail">
        <div className="label">Detail</div>
        <ul>
          {row.detail.map((d, i) => <li key={i}>{fmtInline(d)}</li>)}
        </ul>
      </div>
    </div>
  );
}

function App() {
  useReveal();
  return (
    <>
      <Nav current="career"/>
      <main className="page">
        <header className="page-head">
          <div className="crumb"><a href="/eleanor-portfolio/">Home</a> <span>/</span> <span>Career</span></div>
          <h1>Integrated marketing at scale.</h1>
          <h1>From <em>startup</em> to <em>unicorn.</em></h1>
          <p className="sub">Bridging the gap between market strategy and technical execution. My background across lifecycle, product launches, and analytics allows me to translate high-level business goals into measurable and scalable systems.</p>
        </header>

        <section className="section" style={{paddingTop: 48}}>
          <div className="career-list">
            {D.career.map((row, i) => (
              <Row key={i} row={row} idx={i}/>
            ))}
          </div>
        </section>

        <section className="section" style={{borderBottom: 0}}>
          <div className="cta-block">
            <h3>Want the <em>one-pager?</em></h3>
            <div style={{display: "flex", gap: 16, justifyContent: "center", flexWrap: "wrap"}}>
              <a href="/eleanor-portfolio/Eleanor_Lansner_Resume.docx" className="btn">View resume →</a>
              <a href="/eleanor-portfolio/projects/" className="btn outline">See projects</a>
            </div>
          </div>
        </section>
      </main>
      <Footer/>
    </>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
