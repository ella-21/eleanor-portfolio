<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Now, Eleanor Lansner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel">

const { useEffect } = React;
const D = window.SITE_DATA;

function Hero() {
  return (
    <section className="hero">
      <div className="hero-portrait">
        <img src="assets/portrait.png" alt="Eleanor Lansner" style={{position:"absolute", inset:0, width:"100%", height:"100%", objectFit:"cover"}} />
      </div>
      <span className="eyebrow"><span className="pulse"></span>Available summer 2026</span>
      <h1>
        Stories that<br />
        <em>move</em> product,<br />
        numbers that<br />
        prove it.
      </h1>
      <div className="hero-grid">
        <p className="lede">
          Product marketer with <strong>4+ years</strong> translating consumer insight and brand strategy into go-to-market plans that ship. Now deepening the analytical foundation underneath the storytelling at <strong>CU Boulder</strong>.
        </p>
        <div className="hero-card" data-reveal>
          {D.meta.map((m, i) =>
          <div className="row" key={i}>
              <span className="k">{m.k}</span>
              <span className="v">{m.v}</span>
            </div>
          )}
        </div>
      </div>
    </section>
  );
}

function App() {
  useReveal();
  return (
    <>
      <Nav current="now" />
      <main className="page">
        <Hero />
        <header className="page-head">
          <div className="crumb"><a href="index.html">Home</a> <span>/</span> <span>Now</span></div>
          <h1>What I'm into <em>right now.</em></h1>
          <p className="sub">A quick snapshot of the work, reading, training, and products I'm focused on today.</p>
        </header>

        <section className="section">
          <div className="now-head">
            <h3>Just landed <span className="ampersand">&</span> based in NYC</h3>
            <span className="stamp">Updated this week</span>
          </div>
          <div className="now-strip" data-reveal>
            {D.now.items.map((it, i) =>
              <div className="now-item" key={i}>
                <span className="k">{it.k}</span>
                <span className="v">{it.v}</span>
              </div>
            )}
          </div>
        </section>

        <section className="section" style={{ borderBottom: 0 }}>
          <div className="cta-block">
            <h3>More on the portfolio</h3>
            <div style={{ display: "flex", gap: 16, justifyContent: "center", flexWrap: "wrap" }}>
              <a href="about.html" className="btn">About</a>
              <a href="projects.html" className="btn outline">Projects</a>
              <a href="resume.html" className="btn outline">Resume</a>
            </div>
          </div>
        </section>
      </main>
      <Footer />
    </>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

</html>
