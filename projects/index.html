<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projects, Eleanor Lansner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="../data.js"></script>
<script type="text/babel" src="../shared.jsx"></script>
<script type="text/babel">

const { useEffect } = React;
const D = window.SITE_DATA;

function App() {
  useReveal();
  return (
    <>
      <Nav current="projects" />
      <main className="page">
        <header className="page-head">
          <div className="crumb"><a href="/eleanor-portfolio/">Home</a> <span>/</span> <span>Projects</span></div>
          <h1>Launches,<br /><em>segments,</em><br />seasons.</h1>
          <p className="sub">Selected work across GTM strategy, segmentation, launch ops, and analytics-driven storytelling.</p>
        </header>

        <section className="section">
          <div className="proj-list" data-reveal>
            {D.projects.map((project, i) =>
              <div className="proj-row" key={i}>
                <div className="num">{String(i + 1).padStart(2, "0")}</div>
                <div>
                  <h3>{project.title}</h3>
                  <div className="meta">
                    <span>{project.tag}</span>
                    <span className="dot"></span>
                    <span>{project.brand}</span>
                  </div>
                </div>
                <p className="blurb">{project.blurb}</p>
                <div className="arrow">→</div>
              </div>
            )}
          </div>
        </section>

        <section className="section" style={{ borderBottom: 0 }}>
          <div className="cta-block">
            <h3>Want the <em>one-pager?</em></h3>
            <div style={{ display: "flex", gap: 16, justifyContent: "center", flexWrap: "wrap" }}>
              <a href="/eleanor-portfolio/resume/" className="btn">View resume →</a>
              <a href="/eleanor-portfolio/about/" className="btn outline">About</a>
            </div>
          </div>
        </section>
      </main>
      <Footer />
    </>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
